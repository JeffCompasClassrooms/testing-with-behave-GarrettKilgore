name: Behave Systems Tests CI

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  run-behave-tests:
    runs-on: ubuntu-latest
    env:
      BEHAVE_DRIVER: chrome
      BEHAVE_HEADLESS: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies (FORCED VERSIONS)
        run: |
          pip install -r requirements.txt || true
          # Force specific compatible versions of behave and behave-webdriver
          pip install behave==1.2.6 behave-webdriver selenium

      - name: Install Chrome and chromedriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          sudo ln -s /usr/bin/chromium-browser /usr/bin/google-chrome || true
          which chromium-browser
          which chromedriver

      - name: Run ALL Behave tests
        run: |
          # Explicitly list the paths to all your feature directories
          behave isitchristmas/features/ DownloadMoreRam/features/ Amazon/features/ peppers-ghost/features/
