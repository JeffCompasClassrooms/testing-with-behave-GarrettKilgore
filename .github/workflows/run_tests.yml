name: Behave Systems Tests CI

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  run-behave-tests:
    runs-on: ubuntu-latest
    env:
      BEHAVE_DRIVER: chrome
      BEHAVE_HEADLESS: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python (Downgraded to 3.8)
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies (LOCKED VERSIONS)
        run: |
          pip install -r requirements.txt || true
          # Lock all versions to known compatible ones
          pip install behave==1.2.6 behave-webdriver==0.3.0 selenium==3.141.0

      - name: Install Chrome and chromedriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          sudo ln -s /usr/bin/chromium-browser /usr/bin/google-chrome || true
          which chromium-browser
          which chromedriver

      - name: Run ALL Behave tests
        run: |
          # Explicitly list the paths to all your feature directories
          behave isitchristmas/features/ DownloadMoreRam/features/ Amazon/features/ peppers-ghost/features/
