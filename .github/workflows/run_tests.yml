name: Behave Systems Tests CI

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  run-behave-tests:
    runs-on: ubuntu-latest
    env:
      BEHAVE_DRIVER: chrome
      BEHAVE_HEADLESS: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python (3.10.12)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10.12'

      - name: Install dependencies (locked versions)
        run: |
          pip install -r requirements.txt
          
      - name: Install Chrome and chromedriver
        run: |
          sudo apt-get update
          # Install Chromium and its driver, which is compatible with your setup
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Debug environment
        run: |
          python --version
          pip list | grep -E "behave|selenium|webdriver"

      - name: Run ALL Behave tests
        # --- CRITICAL FIX: Run ALL features in ONE behave command ---
        # List all the directories containing your .feature files
        run: |
          behave isitchristmas/features/
