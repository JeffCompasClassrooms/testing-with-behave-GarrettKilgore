name: Behave Systems Tests CI

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  run-behave-tests:
    runs-on: ubuntu-latest
    env:
      BEHAVE_DRIVER: chrome
      BEHAVE_HEADLESS: true
      BEHAVE_TIMEOUT: "10"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python (3.8 for compatibility)
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Install dependencies (locked versions)
        run: |
          pip install -r requirements.txt || true
          pip install behave==1.3.3 behave-webdriver==0.3.1 selenium==3.141.0

      - name: Install Chrome and chromedriver
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          sudo ln -s /usr/bin/chromium-browser /usr/bin/google-chrome || true

      - name: Debug environment
        run: |
          python --version
          pip list | grep -E "behave|selenium|webdriver"

      - name: Run ALL Behave tests
        run: |
          behave isitchristmas/features/
          behave DownloadMoreRam/features/
          behave Amazon/features/
          behave peppers-ghost/features/
