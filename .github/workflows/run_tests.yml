name: Behave Systems Tests CI

on:
  push:
    branches:
      - main
      # Optionally add a 'develop' branch here if needed
  workflow_dispatch: {}

jobs:
  run-behave-tests:
    runs-on: ubuntu-latest
    env:
      # These env vars are good, though behave-webdriver might ignore them by default
      BEHAVE_DRIVER: chrome 
      BEHAVE_HEADLESS: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies (UPDATED)
        run: |
          pip install -r requirements.txt || true
          # Use the latest version of behave-webdriver and selenium for compatibility
          pip install behave behave-webdriver selenium

      - name: Install Chrome and chromedriver (REQUIRED for behave-webdriver)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          # Create a symlink that behave-webdriver expects
          sudo ln -s /usr/bin/chromium-browser /usr/bin/google-chrome || true
          which chromium-browser
          which chromedriver

      - name: Run ALL Behave tests
        run: |
          # Explicitly list the paths to all your feature directories
          behave isitchristmas/features/ DownloadMoreRam/features/ Amazon/features/ peppers-ghost/features/
